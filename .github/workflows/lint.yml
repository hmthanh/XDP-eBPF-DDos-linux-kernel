name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-24.04
    
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format shellcheck

      - name: Check C code formatting (clang-format)
        run: |
          for file in *.c; do
            echo "Checking $file..."
            clang-format -n "$file" || echo "warning: $file may need formatting"
          done

      - name: Check shell script syntax
        run: shellcheck tc_rate_limit.sh

      - name: Check Makefile syntax
        run: |
          make --dry-run > /dev/null 2>&1 && echo "✓ Makefile syntax OK" || echo "✗ Makefile has issues"

  staticanalysis:
    runs-on: ubuntu-24.04
    
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tools

      - name: Run clang static analyzer
        run: |
          clang-17 --analyze *.c -I. -Wno-error || true
