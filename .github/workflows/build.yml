name: Build XDP/eBPF DDoS Defence

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
      - uses: actions/checkout@v4

      - name: Update package cache
        run: sudo apt-get update

      - name: Install build dependencies
        run: |
          # Install tools for the actual running kernel
          KERNEL_VERSION=$(uname -r)
          sudo apt-get install -y \
            clang-17 llvm-17 libbpf-dev \
            linux-tools-azure \
            linux-headers-generic \
            iproute2 libelf-dev zlib1g-dev \
            build-essential

      - name: Verify kernel configuration
        run: |
          echo "Kernel version:"
          uname -r
          echo "BTF support:"
          if [ -f /sys/kernel/btf/vmlinux ]; then
            echo "✓ /sys/kernel/btf/vmlinux available"
          else
            echo "✗ /sys/kernel/btf/vmlinux NOT FOUND (may need CONFIG_DEBUG_INFO_BTF=y)"
          fi

      - name: Find bpftool binary and set environment
        run: |
          # The bpftool wrapper script (/usr/bin/bpftool) checks kernel version strictly.
          # Find the actual binary from the installed linux-tools package.
          BPFTOOL_BIN=""
          
          # Try to get the actual bpftool from the installed linux-tools package
          if command -v dpkg-query >/dev/null 2>&1; then
            # Find the actual bpftool binary from linux-tools package
            BPFTOOL_BIN=$(dpkg -L linux-tools-6.17.0-1011-azure 2>/dev/null | grep "bin/bpftool$" | head -1)
            if [ -z "$BPFTOOL_BIN" ]; then
              # Fallback: search all linux-tools packages
              BPFTOOL_BIN=$(dpkg -L "linux-tools-*" 2>/dev/null | grep "bin/bpftool$" | head -1)
            fi
          fi
          
          # If dpkg search didn't work, search /usr/lib directly
          if [ -z "$BPFTOOL_BIN" ]; then
            for dir in /usr/lib/linux-tools-* /usr/bin/linux-tools-*; do
              if [ -f "$dir/bpftool" ] && [ -x "$dir/bpftool" ]; then
                BPFTOOL_BIN="$dir/bpftool"
                break
              fi
            done
          fi
          
          # Last resort: use the wrapper but set env to bypass version check
          if [ -z "$BPFTOOL_BIN" ]; then
            echo "Using wrapper bpftool (version check may fail)"
            BPFTOOL_BIN="/usr/bin/bpftool"
          fi
          
          if [ ! -x "$BPFTOOL_BIN" ]; then
            echo "ERROR: Could not find executable bpftool"
            echo "Searching for bpftool files:"
            find /usr -name bpftool 2>/dev/null || true
            exit 1
          fi
          
          echo "Found bpftool at: $BPFTOOL_BIN"
          echo "BPFTOOL=$BPFTOOL_BIN" >> $GITHUB_ENV
          "$BPFTOOL_BIN" version

      - name: Build project
        run: |
          # Pass bpftool binary explicitly to make, bypassing wrapper version check
          make clean && make all BPFTOOL="${BPFTOOL}"

      - name: List generated artifacts
        run: |
          echo "=== Generated binaries and objects ==="
          ls -lh *.o xdp_ddos_user vmlinux.h xdp_ddos.skel.h 2>/dev/null || echo "Some artifacts not found"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: xdp-ddos-binaries
          path: |
            xdp_ddos_user
            xdp_ddos_kern.o
            tc_ingress_kern.o
            tc_egress_kern.o
            xdp_ddos.skel.h
            vmlinux.h
          retention-days: 30

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            xdp_ddos_user
            xdp_ddos_kern.o
            tc_ingress_kern.o
            tc_egress_kern.o
          draft: false
          prerelease: false
