# /etc/sysctl.d/99-discord-chat.conf
#
# Kernel tuning for a 200 M MAU real-time WebSocket chat platform.
# Deployed in front of an Erlang/BEAM layer with 2–5 M concurrent TCP
# connections per node, mostly small frames (< 1 KB), peak 500 K new
# connections/sec during events.
#
# Every value includes:
#   (a) what it does
#   (b) WHY this value for 200 M MAU WebSocket load
#   (c) formula / reference used
#
# Reload with: sysctl --system
# Inspect a single value: sysctl net.ipv4.tcp_rmem

# ============================================================================
# Network socket buffer sizing
# ============================================================================

# Upper bound for SO_RCVBUF / SO_SNDBUF requested by any socket.
# WHY: BEAM uses ~5 M sockets per node. At 128 MB max, the kernel will
#      autotune actual use far lower (see tcp_rmem below); this just
#      unblocks TCP's receive-window auto-scaling under bursty load.
# FORMULA: BDP on a 25 GbE link to a distant client ≈ 25e9/8 × 40 ms ≈ 125 MB.
net.core.rmem_max = 134217728   # 128 MiB
net.core.wmem_max = 134217728

# Default buffer size when the application doesn't set SO_*BUF.
# WHY: 16 MiB gives BEAM plenty of headroom for the "normal" steady-state
#      WebSocket frame (< 1 KB) while still allowing burst absorption.
net.core.rmem_default = 16777216
net.core.wmem_default = 16777216

# TCP-specific auto-tuning bounds: min / default / max (bytes).
# min 4 KB   : tiny, only takes effect under memory pressure
# default    : 87380 rx / 65536 tx — stock Linux values, fine for chat
# max 128 MB : same ceiling as rmem_max so the autotuner can actually use it
# WHY: small default + large max lets 5 M idle connections cost almost
#      nothing in memory while the few hot streams can still open the
#      receive window to fill a fat pipe.
net.ipv4.tcp_rmem = 4096 87380  134217728
net.ipv4.tcp_wmem = 4096 65536  134217728

# UDP per-socket floor. Media-relay sidecars occasionally see bursty UDP;
# a 256 KiB floor prevents drops during RTCP feedback storms.
net.ipv4.udp_rmem_min = 262144
net.ipv4.udp_wmem_min = 262144

# ============================================================================
# Connection acceptance & backlog
# ============================================================================

# Maximum listen() backlog; default 4096 is absurdly small at 500 K new
# conns/sec. 65535 gives the accept loop one full second of buffering
# even if userspace stalls briefly.
# WHY: 500 000 cps ÷ 10 accept threads = 50 K/thread headroom.
net.core.somaxconn = 65535

# Per-listener SYN queue depth before the kernel starts dropping / sending
# cookies. At 500 K new conns/sec with an assumed 200 ms RTT, the in-flight
# SYN_RECV window is 500 000 × 0.2 = 100 000; double that for safety.
net.ipv4.tcp_max_syn_backlog = 262144

# NAPI/softirq per-CPU backlog before the stack drops.
# FORMULA: 25 Gbit/s ÷ 64 B packets ≈ 48 Mpps aggregate; with 32 RX queues
#          that is ~1.5 Mpps per queue. 250 K slots ≈ 170 ms of headroom —
#          plenty for GC pauses or scheduler hiccups.
net.core.netdev_max_backlog = 250000

# ============================================================================
# TCP behaviour — long-lived WebSocket connections
# ============================================================================

# Time (seconds) a socket spends in FIN_WAIT_2. WebSocket closes are
# usually mutual; a 10 s value releases ephemeral-port pressure fast
# while still handling RTT outliers.
net.ipv4.tcp_fin_timeout = 10

# Recycle TIME_WAIT sockets for outbound connections (safe since 4.12+).
# WHY: every reconnect burst during a deploy can leave ~5 M TIME_WAIT
#      sockets; without reuse we exhaust the ephemeral port range.
net.ipv4.tcp_tw_reuse = 1

# SYN cookies under backlog pressure. XDP is the primary SYN defence in
# this stack — we drop obvious floods at the NIC. tcp_syncookies = 1 is
# kept as a fallback for legitimate traffic bursts that slip past XDP.
# Note: with syncookies engaged, timestamps/SACK are still honoured.
net.ipv4.tcp_syncookies = 1

# Do NOT reset cwnd after idle. Chat traffic is bursty per-user (seconds
# of silence, then a flurry); resetting the window every idle period
# doubles perceived first-message latency. Critical for WebSocket UX.
net.ipv4.tcp_slow_start_after_idle = 0

# Keepalive tuning for dead-peer detection on 10 M idle connections.
# FORMULA: time + intvl × probes = 60 + 10 × 3 = 90 s worst-case detection.
# WHY: cellular clients NAT-rebind roughly every 2–3 min; detecting dead
#      sockets within ~90 s reclaims BEAM mailboxes before they pile up.
net.ipv4.tcp_keepalive_time   = 60
net.ipv4.tcp_keepalive_intvl  = 10
net.ipv4.tcp_keepalive_probes = 3

# TCP Fast Open, client + server (bitmask 3 = 1|2).
# INTERACTION WITH XDP SYN TRACKING: TFO SYNs carry a cookie + data in the
# SYN; XDP still counts them as a single SYN per flow in conn_tracker, so
# the SYN_THRESHOLD logic is unaffected. The kernel validates the cookie
# before any application wake-up — TFO makes legitimate reconnects faster
# without weakening the XDP defence.
net.ipv4.tcp_fastopen = 3

# PMTU discovery in "probing" mode — recover automatically from ICMP
# blackholes (common on mobile networks), critical for WebSocket MTU
# mismatches after a network handover.
net.ipv4.tcp_mtu_probing = 1

# Queue throttling: don't hand more than 16 KiB to the NIC driver before
# the previous segment is ACKed. Reduces bufferbloat on the egress path
# and keeps WebSocket write-path p99 latency flat.
# FORMULA: ≈ 10 × MSS of 1460 B; tuned for <8 ms additional delay at 25 GbE.
net.ipv4.tcp_notsent_lowat = 16384

# ============================================================================
# Congestion control — BBR + FQ
# ============================================================================

# BBR (v1 in 6.8; v2/v3 when upstreamed) gives dramatically better
# performance than CUBIC over lossy cellular paths, which is the dominant
# client mix for a global chat platform.
net.ipv4.tcp_congestion_control = bbr

# BBR requires pacing; the FQ qdisc provides it. If this is left at the
# default pfifo_fast, BBR falls back to software pacing which is measurably
# less efficient at high cps. See tc_rate_limit.sh for the FQ config.
net.core.default_qdisc = fq

# ============================================================================
# File descriptors & process memory
# ============================================================================

# System-wide open-FD ceiling. Each TCP socket consumes one FD; at 10 M
# connections per node we need headroom for epoll/FDs used by logging,
# metrics, unix sockets, etc. 20 M is ~2× worst-case.
fs.file-max = 20000000

# Per-process ceiling for RLIMIT_NOFILE / prlimit. Must be ≥ fs.file-max.
fs.nr_open = 20000000

# Swap reluctance. We never want BEAM's working set paged out; 10 keeps
# the kernel from swapping except under severe memory pressure.
vm.swappiness = 10

# Dirty-page writeback thresholds. Chat workloads are latency-sensitive;
# small dirty ratios avoid big periodic writeback stalls.
# FORMULA: 15 % of 256 GB = 38 GB foreground; flushers kick in at 5 % (12 GB).
vm.dirty_ratio            = 15
vm.dirty_background_ratio = 5

# ============================================================================
# Port range & TCP options
# ============================================================================

# Maximum ephemeral-port window (64 511 ports).
# WHY: needed for outbound connection volume in internal service mesh.
#      Combined with tcp_tw_reuse this keeps port-exhaustion at bay.
net.ipv4.ip_local_port_range = 1024 65535

# Timestamps are required for PAWS and tcp_tw_reuse to work correctly.
net.ipv4.tcp_timestamps    = 1
net.ipv4.tcp_sack          = 1
net.ipv4.tcp_window_scaling = 1

# Software uRPF in strict mode (RFC 3704 §2).
# RELATIONSHIP WITH XDP uRPF: the XDP fast-path in xdp_ddos_kern.c does a
# *loose* uRPF using bpf_fib_lookup() and drops only definitively
# unroutable sources. Kernel rp_filter = 1 catches anything slipping past
# the XDP layer (e.g. SKB-mode bypass, non-IPv4) with strict RPF. Double
# defence is intentional and essentially free on modern CPUs.
net.ipv4.conf.all.rp_filter     = 1
net.ipv4.conf.default.rp_filter = 1

# ============================================================================
# io_uring (kernel 6.x)
# ============================================================================

# Keep io_uring enabled. BEAM currently uses epoll so this is dormant for
# the chat layer, but Rust sidecar services (media relay, rate-limit
# aggregator) use io_uring for zero-copy recv on the UDP fast-path.
kernel.io_uring_disabled = 0

# ============================================================================
# End of file
# ============================================================================
